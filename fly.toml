# fly.toml app configuration file generated for ph-sgh on 2026-04-24T16:56:27Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ph-sgh'
primary_region = 'fra'

[build]
  [build.args]
    GO_VERSION = '1.25.0'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[mounts]
source = "pizza_data"
destination = "/data"
